<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YourDiet</title>
  <link rel="stylesheet" href="YourDiet.css" />

<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body>
  
  

  <div class="main">
    <div class="container">
      <div class="left">
  <div class="header">

    <img class="logo" src="yourdietlogo.png" alt="YourDiet Logo" />

    <nav>
      <a href="#">SOBRE NÓS</a>
      <a href="#">CONTATO</a>
      <a href="#">ENTRAR</a>
    </nav>

  </div>
</div>
      <div class="right">
        <h2>Entrar</h2>
        <form class="login-form" onsubmit="return false;">
          <label for="usuario" class="sr-only">Nome de Usuário</label>
          <input id="usuario" type="text" placeholder="Nome de Usuário" />

          <label for="senha" class="sr-only">Senha</label>
          <input id="senha" type="password" placeholder="Senha" />

          <button type="submit" class="btn primary">Entrar</button>
          <button type="button" class="btn ghost">Criar Conta</button>
          
        </form>
      </div>
    </div>
  </div>
</body>
</html>
