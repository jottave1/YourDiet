<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YourDiet</title>
  <link rel="stylesheet" href="YourDiet.css" />
</head>
<body>
  
  <img class="logo" src="yourdietlogo.png" alt="YourDiet Logo" />

  <div class="main">
    <div class="container">
      <div class="left"></div>
      <div class="right">
        <h2>Entrar</h2>
        <form class="login-form" onsubmit="return false;">
          <label for="usuario" class="sr-only">Nome de usuário</label>
          <input id="usuario" type="text" placeholder="Nome de usuário" />

          <label for="senha" class="sr-only">Senha</label>
          <input id="senha" type="password" placeholder="Senha" />

          <button type="submit" class="btn primary">Entrar</button>
          <button type="button" class="btn ghost">Criar Conta</button>
          
        </form>
      </div>
    </div>
  </div>
</body>
</html>
